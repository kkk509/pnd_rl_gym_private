# Adam Lite 12DOF MuJoCo Deployment Configuration
policy_path: "{LEGGED_GYM_ROOT_DIR}/deploy/pre_train/adam_lite_12dof/motion.pt"
xml_path: "{LEGGED_GYM_ROOT_DIR}/resources/robots/adam_lite/scene_12dof.xml"

# Total simulation time
simulation_duration: 120.0
# Simulation time step
simulation_dt: 0.002
# Controller update frequency (meets the requirement of simulation_dt * control_decimation=0.02; 50Hz)
control_decimation: 10

# PD gains based on training config
# Joint order: hipPitch_L, hipRoll_L, hipYaw_L, kneePitch_L, anklePitch_L, ankleRoll_L,
#              hipPitch_R, hipRoll_R, hipYaw_R, kneePitch_R, anklePitch_R, ankleRoll_R
kps: [150, 100, 80, 180, 40, 20, 150, 100, 80, 180, 40, 20]
kds: [3.0, 2.5, 2.0, 4.0, 2.0, 1.5, 3.0, 2.5, 2.0, 4.0, 2.0, 1.5]

default_angles: [-0.1,  0.0,  0.0,  0.3, -0.2, 0.0, 
                  -0.1,  0.0,  0.0,  0.3, -0.2, 0.0]

ang_vel_scale: 0.25
dof_pos_scale: 1.0
dof_vel_scale: 0.05
action_scale: 0.22
cmd_scale: [2.0, 2.0, 0.25]
num_actions: 12
num_obs: 47

cmd_init: [0.8, 0, 0]

