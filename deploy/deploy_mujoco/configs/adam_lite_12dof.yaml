kds: [6.1, 30.0, 6.1, 6.1, 2.55, 0.35, 6.1, 30.0, 6.1, 6.1, 2.55, 0.35]

# kps: [150, 100, 80, 180, 40, 0, 150, 100, 80, 180, 40, 0]
# kds: [3.0, 2.5, 2.0, 4.0, 2.0, 0.35, 3.0, 2.5, 2.0, 4.0, 2.0, 0.35]

default_angles: [-0.1,  0.0,  0.0,  0.35, -0.25, 0.0, 
