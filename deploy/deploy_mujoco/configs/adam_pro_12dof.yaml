# Adam Pro 12DOF MuJoCo Deployment Configuration
policy_path: "{LEGGED_GYM_ROOT_DIR}/logs/adam_pro_12dof/exported/policies/policy_lstm_1.pt"
xml_path: "{LEGGED_GYM_ROOT_DIR}/resources/robots/adam_pro/scene_adam_pro_12dof_simplified_collision.xml"

# Total simulation time
simulation_duration: 120.0
# Simulation time step
simulation_dt: 0.0025
# Controller update frequency (simulation_dt * control_decimation = 0.02; 50Hz)
control_decimation: 8
render_decimation: 4
# Joint order: hipPitch_L, hipRoll_L, hipYaw_L, kneePitch_L, anklePitch_L, ankleRoll_L,
#              hipPitch_R, hipRoll_R, hipYaw_R, kneePitch_R, anklePitch_R, ankleRoll_R
kps: [305, 700, 405, 305, 30, 0, 
      305, 700, 405, 305, 30, 0]

kds: [6.1, 30.0, 6.1, 6.1, 3.0, 0.35, 
      6.1, 30.0, 6.1, 6.1, 3.0, 0.35]

default_angles: [-0.32,  0.0,  -0.18,  0.66, -0.29, 0.0, 
                 -0.32,  0.0,  0.18,  0.66, -0.29, 0.0]

ang_vel_scale: 0.25
dof_pos_scale: 1.0
dof_vel_scale: 0.05
action_scale: 0.5

cmd_scale: [2.0, 2.0, 0.25]
num_actions: 12
num_obs: 47

command_transition_time: 0.25

stand_threshold: 0.05
walk_threshold: 0.15
yaw_motion_scale: 0.5

gait_period: 0.8
gait_phase_offset: 0.5

cmd_init: [0, 0, 0]
